<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>타로 카드 인터랙션</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <!--toast UI-->
        <div id="toast">toast msg</div>

        <!--Json UI-->
        <div id="jsonScreen">
            <div class="container">
                <section class="input-area">
                    <div class="title"><span>타로 스프레드</span></div>
                    <hr>

                    <!-- 스프레드 선택 -->
                    <strong style="font-size:larger">스프레드 선택</strong>
                    <div id="spreadSelector" class="spread-selector"></div>

                    <!-- 직접 입력 슬롯 (custom일 때만) -->
                    <div id="customSlotArea" class="custom-slot-area" style="display:none;">
                        <div class="custom-slot-row">
                            <label>슬롯 1</label>
                            <input type="text" id="customSlot1" placeholder="예: 나의 현재" maxlength="20" />
                        </div>
                        <div class="custom-slot-row">
                            <label>슬롯 2</label>
                            <input type="text" id="customSlot2" placeholder="예: 상대의 마음" maxlength="20" />
                        </div>
                        <div class="custom-slot-row">
                            <label>슬롯 3</label>
                            <input type="text" id="customSlot3" placeholder="예: 둘의 미래" maxlength="20" />
                        </div>
                    </div>

                    <hr>

                    <!-- 카드 폼 에디터 -->
                    <strong style="font-size:larger">결과 입력</strong>
                    <p class="hint-text">ooc를 복사해 AI에게 양식을 요청한 뒤, 폼에 직접 채우거나 JSON을 붙여넣어 폼에 적용하세요.</p>

                    <div id="cardForms" class="card-forms"></div>

                    <!-- raw JSON 미리보기 -->
                    <div class="json-preview-wrap">
                        <div class="json-preview-header">
                            <span class="json-preview-label">📋 JSON 미리보기 / 직접 편집</span>
                            <button class="btn-small white" id="pasteJsonBtn">⬆️ JSON → 폼에 적용</button>
                        </div>
                        <textarea id="jsonInput" class="json-preview-textarea"
                            placeholder="폼을 채우면 여기에 자동 생성됩니다. AI가 준 JSON을 붙여넣고 '폼에 적용' 버튼을 누르세요."></textarea>
                    </div>

                    <button class="red" id="clearBtn" style="margin-top:10px">전체 초기화</button>
                    <div style="display:flex;flex-direction:row;gap:10px;margin-top:15px;">
                        <button class="white" id="oocBtn">🖊️ ooc 복사</button>
                        <button id="launchBtn">🌟 타로 결과</button>
                    </div>
                </section>
            </div>
        </div>

        <!--Tarot UI-->
        <div id="tarotScreen" style="display:none;">
            <div class="container-buttons">
                <div id="spreadLabel" class="spread-label"></div>
                <button id="backBtn" class="white">⇦ 돌아가기</button>
            </div>

            <!-- card click modal -->
            <div id="tarotModal" class="modal">
                <div class="modal-wrapper">
                    <div class="modal-content">
                        <div id="modal-card-info" class="card-info">
                            <div class="card-img-container"><div class="card-img"></div></div>
                            <div class="card-info-inner">
                                <div class="card-number"></div>
                                <div class="card-name"></div>
                                <hr />
                                <div class="card-direction"></div>
                                <div class="card-keyword"></div>
                            </div>
                        </div>
                        <div class="modal-bottom">
                            <span class="modal-title" id="modalTitle"></span>
                            <hr />
                            <div id="modal-interpretation" class="interpretation"></div>
                            <div class="comment-bubbles">
                                <div class="bubble char" id="char-comment"></div>
                                <div class="bubble user" id="user-comment"></div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-button-area">
                        <button id="saveModalBtn" class="purple">💾 이미지 저장</button>
                        <button id="close-button" class="red">닫기</button>
                    </div>
                </div>
            </div>

            <!-- card table -->
            <div class="tarot-table">
                <div class="card-slot-wrap" data-slot="0">
                    <div class="slot-label"></div>
                    <div class="card-container" data-card-index="0">
                        <div class="card">
                            <div class="card-face card-back"></div>
                            <div class="card-face card-front"></div>
                        </div>
                    </div>
                </div>
                <div class="card-slot-wrap" data-slot="1">
                    <div class="slot-label"></div>
                    <div class="card-container" data-card-index="1">
                        <div class="card">
                            <div class="card-face card-back"></div>
                            <div class="card-face card-front"></div>
                        </div>
                    </div>
                </div>
                <div class="card-slot-wrap" data-slot="2">
                    <div class="slot-label"></div>
                    <div class="card-container" data-card-index="2">
                        <div class="card">
                            <div class="card-face card-back"></div>
                            <div class="card-face card-front"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="function.js"></script>
        <script src="ui.js"></script>
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"
            integrity="sha512-01CJ9/g7e8cUmY0DFTMcUw/ikS799FHiOA0eyHsUWfOetgbx/t6oV4otQ5zXKQyIrQGTHSmRVPIgrgLcZi/WMA=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        ></script>
        <script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
    </body>
</html>
